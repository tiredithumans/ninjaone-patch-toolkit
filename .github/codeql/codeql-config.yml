name: "ninjaone-patch-toolkit CodeQL config"

# web-rs (the WASM frontend) is intentionally NOT ignored: its code runs inside
# the webview with IPC access, so it's scanned alongside the backend. The
# workflow installs the wasm32 target + fetches its deps so the extractor can
# resolve it.
#
# Only build output is excluded — extracting it adds nothing and drags database
# quality. `**/target` covers both crates' build dirs; `web-rs/dist` is the Trunk
# artifact (and the macro-existence stub the workflow drops).
paths-ignore:
  - "**/target"
  - "web-rs/dist"

# Default ("code-scanning") query suite — keeps false-positive noise low.
# `security-extended` is a later toggle if broader coverage is wanted.
