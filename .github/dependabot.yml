# Dependabot keeps our pinned dependencies fresh. SHA-pinning GitHub Actions and
# version-locking Cargo crates freezes them at a known-good commit/checksum — but
# without automated bumps those pins rot and we silently miss upstream security
# fixes. Dependabot opens review-gated PRs that advance the pin *and* rewrite the
# `# vX.Y.Z` comment next to each SHA-pinned action.
#
# Commit-message prefixes follow this repo's Conventional Commits (AGENTS.md):
#   ci   -> GitHub Actions workflow bumps
#   deps -> Cargo crate bumps
version: 2
updates:
  # GitHub Actions used by .github/workflows/*.yml — all pinned to full commit SHAs.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      # One PR per week for all action bumps instead of one PR per action.
      actions:
        patterns:
          - "*"
    ignore:
      # dtolnay/rust-toolchain encodes the *toolchain* in the ref: upstream ships
      # one rolling `v1` tag and publishes toolchain versions as branches, so our
      # `@<sha> # 1.96.0` pin is a commit on the 1.96.0 branch with no semver tag
      # containing it. Dependabot can't map that SHA back to a version and errors
      # the whole github-actions job (`unknown_error`), which reports the weekly
      # run as failed even though the other action bumps land fine. Bumping this
      # pin is an MSRV decision that belongs with rust-toolchain.toml, not a
      # routine dependency bump — so exclude it rather than let it break the job.
      - dependency-name: dtolnay/rust-toolchain

  # Backend crate (src-tauri). Registry crates are pinned by exact version +
  # checksum in src-tauri/Cargo.lock; Dependabot proposes the upgrades.
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk semver-compatible bumps; majors stay as individual PRs so a
      # breaking upgrade gets its own review.
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # The WASM frontend crate (web-rs) targets wasm32-unknown-unknown and carries
  # its own Cargo.toml + Cargo.lock, so it needs a separate Dependabot entry.
  - package-ecosystem: cargo
    directory: /web-rs
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch
