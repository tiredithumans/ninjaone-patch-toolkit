name: Bug report
description: Something isn't working the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please **do not** include secrets, tokens, client
        IDs/secrets, organization IDs, or device IDs in this report. For security
        vulnerabilities, use the private advisory flow linked on the new-issue page
        instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: The version shown in the app, or the installer filename.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - macOS
        - Linux
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: >
        Paste any relevant log lines from the terminal (the app logs via tracing).
        Redact organization IDs, device IDs, client IDs/secrets, and tokens first.
      render: shell
    validations:
      required: false
