name: Screenshot

# Regenerates the README demo screenshot (docs/images/screenshot.png) by driving the
# built web demo in headless Chromium, then opens a PR with the refreshed image.
# Runs automatically when a release is published (so the README image tracks each
# shipped version) and on manual dispatch — run it after a UI change you want
# reflected in the README. Either way it only opens a PR when the image changed.
on:
  workflow_dispatch:
  release:
    types: [published]

# Needs to push a branch and open a PR with the new image.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: screenshot
  cancel-in-progress: true

jobs:
  capture:
    name: Capture demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: web-rs
      - uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2.84.1
        with:
          tool: just,trunk

      # Build the demo, install Playwright + its Chromium (system deps included on
      # the Linux runner), then capture. The runner ships Node, so no setup-node.
      - name: Build the web demo
        run: just web-build
      - name: Install Playwright Chromium
        run: |
          npm --prefix scripts install --no-audit --no-fund
          (cd scripts && npx playwright install --with-deps chromium)
      - name: Capture screenshot
        run: node scripts/screenshot.mjs

      - name: Push the refreshed screenshot and open a PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- docs/images/screenshot.png; then
            echo "Screenshot unchanged — nothing to open."
            exit 0
          fi
          branch="chore/refresh-screenshot-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add docs/images/screenshot.png
          git commit -m "docs: refresh the README demo screenshot"
          git push origin "$branch"
          # Opening the PR needs the repo setting "Allow GitHub Actions to create and
          # approve pull requests" (off by default for security). If it's blocked,
          # don't fail the run — the branch is pushed; surface a one-click link for a
          # maintainer (or `gh pr create`) to open the PR.
          if ! gh pr create --base main --head "$branch" \
                --title "docs: refresh the README demo screenshot" \
                --body "Automated capture of the live web demo via \`scripts/screenshot.mjs\` (\`.github/workflows/screenshot.yml\`). Review the image and merge."; then
            echo "::notice title=Open the PR::Pushed ${branch}; open it at https://github.com/${{ github.repository }}/compare/main...${branch}?expand=1"
          fi
