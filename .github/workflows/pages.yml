name: Pages

# Publishes the Leptos/WASM frontend to GitHub Pages as a live demo. With no Tauri
# backend in a browser, the app detects this (api::is_tauri) and renders bundled
# sample data instead of calling IPC — sign-in / live query / export are disabled.
on:
  push:
    branches: [main]
    paths:
      - "web-rs/**"
      - "justfile"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Least-privilege, plus the two scopes the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy; let the running publish finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (Leptos/WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: web-rs
      - uses: taiki-e/install-action@ace6ebe54a6a0c86dfb5f7764b17f793b6925bc3 # v2.82.3
        with:
          tool: just,trunk
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      # Builds with the base href set to the repo subpath so assets resolve under
      # https://<user>.github.io/<repo>/. The desktop build keeps the "/" default.
      - name: Build for Pages
        run: just web-build-pages
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: web-rs/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
