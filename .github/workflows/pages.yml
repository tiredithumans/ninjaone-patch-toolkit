name: Pages

# Publishes the Leptos/WASM frontend to GitHub Pages as a live demo. With no Tauri
# backend in a browser, the app detects this (api::is_tauri) and renders bundled
# sample data instead of calling IPC — sign-in / live query / export are disabled.
on:
  push:
    branches: [main]
    paths:
      - "web-rs/**"
      - "justfile"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Least-privilege, plus the two scopes the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy; let the running publish finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (Leptos/WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: web-rs
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: just,trunk
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      # Builds with the base href set to the repo subpath so assets resolve under
      # https://<user>.github.io/<repo>/. The desktop build keeps the "/" default.
      - name: Build for Pages
        run: just web-build-pages
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: web-rs/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
