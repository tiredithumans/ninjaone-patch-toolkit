name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly RustSec database refresh so we catch advisories filed after merge.
    - cron: "0 6 * * 1"

# A new push to the same branch/PR supersedes the in-flight run — without this
# every PR update queues a duplicate full 3-OS matrix.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token for every job. Declared explicitly so a future change
# to the repo-level default can't silently re-broaden these workflows.
permissions:
  contents: read

jobs:
  rust:
    name: Backend (src-tauri) (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # PRs run only the ubuntu leg for fast feedback; push-to-main and the weekly
        # cron run the full 3-OS matrix. windows/macOS are not required PR checks
        # (branch protection), so they validate post-merge.
        os: ${{ (github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]')) || fromJSON('["ubuntu-latest", "windows-latest", "macos-latest"]') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Match the pinned MSRV in rust-toolchain.toml (which rustup honors for the
      # actual build regardless of this line) so the installed toolchain is not
      # misleadingly older than what compiles.
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: just
      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
      # `tauri::generate_context!` (src-tauri/src/lib.rs) reads frontendDist
      # (../web-rs/dist) at COMPILE time, so clippy/test fail without it. The dist
      # is a Trunk artifact (gitignored); a stub satisfies the macro without the
      # full WASM build (the `web` job exercises the real frontend build).
      - name: Stub frontend dist
        shell: bash
        run: |
          mkdir -p web-rs/dist
          printf '<!doctype html><title>stub</title>' > web-rs/dist/index.html
      # fmt is deterministic and clippy is effectively OS-independent for this
      # backend, so run them once (ubuntu) rather than on every matrix leg; `test`
      # runs on each OS present.
      - name: fmt (both crates)
        if: matrix.os == 'ubuntu-latest'
        run: just fmt-check
      - name: clippy
        if: matrix.os == 'ubuntu-latest'
        run: just clippy
      - name: test
        run: just test

  web:
    name: Frontend (Leptos/WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: web-rs
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: just,trunk
      # web-rs is a separate wasm32 crate the backend `rust` job's clippy never
      # reaches — lint it here (wasm target, -D warnings), then prove it builds
      # through Trunk (the `before*Command` path Tauri uses).
      - name: clippy
        run: just web-clippy
      - name: build
        run: just web-build
      # Pure-helper unit tests run on the host target (the wasm build excludes the
      # #[cfg(test)] module); the helpers under test are JS-free.
      - name: test
        run: just web-test

  coverage:
    name: Coverage (backend)
    # Measurement-only and not a required check — run on push-to-main, not on every
    # PR (it re-compiles + re-runs the backend tests the `rust` job already covered).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # cargo-llvm-cov needs the llvm-tools-preview component for instrumentation.
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: just,cargo-llvm-cov
      - name: Install system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
      # Same compile-time frontendDist stub the backend `rust` job needs.
      - name: Stub frontend dist
        shell: bash
        run: |
          mkdir -p web-rs/dist
          printf '<!doctype html><title>stub</title>' > web-rs/dist/index.html
      # Measurement only — no minimum threshold is enforced yet, so a dip never
      # fails the build. The lcov report is published as an artifact and a per-file
      # summary is surfaced on the run page; ratchet a `--fail-under-lines` gate in
      # once the baseline settles.
      - name: coverage
        run: just coverage
      - name: Summary to run page
        if: always()
        shell: bash
        run: |
          {
            echo '### Backend coverage'
            echo '```'
            cargo llvm-cov --manifest-path src-tauri/Cargo.toml report --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload lcov report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: src-tauri/target/lcov.info
          if-no-files-found: error

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Workflow-file syntax gate. Pinned by version + checksum (no install-action
      # manifest exists).
      - name: actionlint
        run: |
          curl -sSfL -o actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -color

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # The Claude hook scripts gate commits/docs locally; lint them in CI too so a
      # broken hook is caught here, not when it silently fails to fire. shellcheck is
      # preinstalled on the ubuntu-latest runner.
      - name: shellcheck
        run: shellcheck .claude/hooks/*.sh

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # RustSec advisory scan via the same `just` recipe run locally. The recipe
      # covers BOTH lockfiles: src-tauri/Cargo.lock and the frontend's own
      # web-rs/Cargo.lock (the two crates carry independent lockfiles).
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: just,cargo-audit
      - name: audit (both lockfiles)
        run: just audit

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # License + supply-chain (sources) + bans policy from deny.toml, over both
      # crates' trees, via the same `just` recipes used locally. RustSec
      # advisories are NOT re-checked here — the `audit` job (cargo-audit) owns
      # those, so the two gates don't overlap.
      - uses: taiki-e/install-action@bffeee26d4db9be238a4ea78d8826604ebcb594d # v2.82.5
        with:
          tool: just,cargo-deny
      - name: deny (backend)
        run: just deny
      - name: deny (frontend)
        run: just web-deny
