name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so new CodeQL query/extractor releases reach old code.
    # Wednesday, a distinct slot from ci.yml's Monday cron, so the two heavy
    # workflows don't pile onto the same scheduled tick.
    - cron: "0 6 * * 3"

# A new push to the same branch/PR supersedes the in-flight run (mirrors ci.yml).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token, declared explicitly. analyze needs security-events:write
# to upload SARIF; actions:read lets the action read workflow run metadata.
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Rust is supported only in build-mode `none`. The prep below (pinned
      # toolchain, wasm32 target for the separate web-rs crate, native deps,
      # frontend-dist stub, pre-fetched deps) is correct hygiene and future-proofs
      # extraction. Note: CodeQL's Rust extractor may not expand macros, which can
      # cap "% calls with call target" for this codebase — a known extractor
      # limitation, not a config error.
      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            src-tauri
            web-rs
      - name: Install system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev
      # `tauri::generate_context!` (src-tauri/src/lib.rs) reads frontendDist
      # (../web-rs/dist) at COMPILE time; stub it so extraction stays clean.
      - name: Stub frontend dist
        run: |
          mkdir -p web-rs/dist
          printf '<!doctype html><title>stub</title>' > web-rs/dist/index.html
      # Pre-fetch both lockfiles (src-tauri and the separate wasm32 web-rs) so the
      # extractor resolves call targets into dependencies instead of leaving them
      # unresolved.
      - name: Fetch dependencies
        run: |
          cargo fetch --locked --manifest-path src-tauri/Cargo.toml
          cargo fetch --locked --manifest-path web-rs/Cargo.toml --target wasm32-unknown-unknown

      - name: Initialize CodeQL
        uses: github/codeql-action/init@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          languages: rust
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        with:
          category: "/language:rust"
