name: Release (bundles)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

# Two tags pushed close together must not race on which assets attach to which
# draft — queue them instead. Never cancel: a half-cancelled release run is
# worse than a slow one.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  guard:
    name: Guard tag matches manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Fail fast (before the long builds) if a tag was pushed without bumping the
      # version. The bundle/updater take their version from tauri.conf.json; the
      # release name comes from the tag — a mismatch ships a confusingly-versioned
      # build, and the updater would advertise the wrong version. All three
      # manifests (the release skill bumps them in lockstep) must agree.
      - name: Check versions
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          conf=$(jq -r '.version' src-tauri/tauri.conf.json)
          cargo_v=$(grep -m1 -E '^version = ' src-tauri/Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')
          web_v=$(grep -m1 -E '^version = ' web-rs/Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')
          echo "tag=$tag conf=$conf src-tauri=$cargo_v web-rs=$web_v"
          fail=0
          for v in "$conf" "$cargo_v" "$web_v"; do
            if [ "$v" != "$tag" ]; then fail=1; fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::tag v$tag does not match all manifests — bump src-tauri/tauri.conf.json, src-tauri/Cargo.toml, and web-rs/Cargo.toml before tagging"
            exit 1
          fi
          echo "all manifests match v$tag — ok"

      # The notes-extraction steps below fall back to a generic line when the
      # tagged version has no CHANGELOG.md section — fine for workflow_dispatch,
      # but on a tag it means [Unreleased] was never rolled. Fail fast rather
      # than shipping a release (and in-app update splash) with placeholder
      # notes. Uses the exact awk the notes steps use, so the guard's pass/fail
      # matches the fallback condition it protects against.
      - name: Check CHANGELOG has notes for this version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes=$(awk -v ver="$version" '
            /^## \[/ { if (c) exit; if (index($0, "## [" ver "]") == 1) c=1; next }
            c { print }
          ' CHANGELOG.md | sed '/./,$!d')
          if [ -z "$(printf %s "$notes" | tr -d '[:space:]')" ]; then
            echo "::error::CHANGELOG.md has no non-empty '## [$version]' section — the release body and in-app update notes would fall back to generic text. Roll [Unreleased] to [$version] before tagging."
            exit 1
          fi
          echo "CHANGELOG.md has notes for v$version — ok"

  # Create the draft release ONCE, up front, so the per-OS build jobs all upload
  # into the same release instead of each running tauri-action's find-or-create
  # logic. With the matrix creating the release, parallel jobs raced: one job
  # recreated the draft and wiped another's already-uploaded bundles (v0.6.1
  # shipped with the macOS .dmg/.app.tar.gz missing and no `darwin` entry in
  # latest.json). A single pre-created release with a shared releaseId removes
  # that race — the build jobs only ever upload, never (re)create.
  create-release:
    name: Create draft release
    needs: guard
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Same CHANGELOG.md extraction the build jobs use — sets the release body
      # here (the build jobs reuse it for latest.json's `notes`). Kept in sync by
      # being the identical step; see the build job's copy for the rationale.
      - name: Extract changelog notes
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes=""
          if [ -f CHANGELOG.md ]; then
            notes=$(awk -v ver="$version" '
              /^## \[/ { if (c) exit; if (index($0, "## [" ver "]") == 1) c=1; next }
              c { print }
            ' CHANGELOG.md | sed '/./,$!d')
          fi
          if [ -z "$(printf %s "$notes" | tr -d '[:space:]')" ]; then
            notes="See the release notes on GitHub for what's new in v$version."
          fi
          {
            echo "RELEASE_NOTES<<__CHANGELOG_EOF__"
            echo "$notes"
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_ENV"

      - name: Create draft release
        id: create
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          result-encoding: string
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.GITHUB_REF_NAME,
              name: process.env.GITHUB_REF_NAME,
              body: process.env.RELEASE_NOTES,
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    name: Build bundles (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Serialize the OS builds. Each job uploads into the shared draft and, for
      # the updater, reads the release's current latest.json, merges its own
      # platform in, and re-uploads it. That read-modify-write is not atomic, so
      # running the jobs in parallel would lose-update latest.json and drop a
      # platform. One-at-a-time makes the merge safe; releases are infrequent so
      # the extra wall-clock is acceptable.
      max-parallel: 1
      matrix:
        # macos-latest builds natively (Apple Silicon / arm64) — the approach that
        # worked for v0.1.0. The *universal-binary* bundling was the failing step
        # (not signing, not the code — the backend compiles on macOS in CI), so we
        # build native here. arm64-only is deliberate (documented in README):
        # Intel Macs are past Apple's last macOS, GitHub retired the macos-13
        # image in Dec 2025, and the one remaining Intel label (macos-15-intel)
        # sunsets in Aug 2027 — adding it here is a one-line matrix change if a
        # user ever needs it. Note: these macOS bundles aren't Apple-notarized,
        # so first launch may need right-click → Open (Gatekeeper) until a
        # Developer ID is set up.
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            src-tauri
            web-rs

      - uses: taiki-e/install-action@5ebac0d9522d786674368e47e92963ba13f2c376 # v2.82.11
        with:
          tool: trunk

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev patchelf

      # Pull this version's CHANGELOG.md section so the GitHub release body AND the
      # updater manifest's `notes` carry the changelog. tauri-action passes
      # `releaseBody` straight through to latest.json's `notes` (which the in-app
      # "Update available" window shows). Runs on every matrix OS via bash (Git Bash
      # on Windows); each job sets the same body. Falls back to a generic line when
      # the tagged version has no section.
      - name: Extract changelog notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes=""
          if [ -f CHANGELOG.md ]; then
            notes=$(awk -v ver="$version" '
              /^## \[/ { if (c) exit; if (index($0, "## [" ver "]") == 1) c=1; next }
              c { print }
            ' CHANGELOG.md | sed '/./,$!d')
          fi
          if [ -z "$(printf %s "$notes" | tr -d '[:space:]')" ]; then
            notes="See the release notes on GitHub for what's new in v$version."
          fi
          {
            echo "RELEASE_NOTES<<__CHANGELOG_EOF__"
            echo "$notes"
            echo "__CHANGELOG_EOF__"
          } >> "$GITHUB_ENV"

      # tauri-action builds the frontend (beforeBuildCommand = trunk build),
      # bundles per-OS, signs the updater artifacts with the minisign key, and
      # uploads the bundles + .sig + its platform's entry in latest.json to the
      # DRAFT release created by `create-release` (via `releaseId` — so the build
      # jobs only upload, never create, which is what stops the asset-clobbering
      # race). `--config src-tauri/updater-build.json` turns on
      # createUpdaterArtifacts only here (the base config leaves it off so local
      # `just build` doesn't need signing keys). Updates go live only when the
      # release is PUBLISHED — a draft isn't "latest", so the floating
      # latest.json endpoint stays on the last published version until you ship.
      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # action-v1.0.0
        env:
          # Required for tauri-action to upload to the GitHub release.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Upload into the pre-created draft instead of finding/creating one.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # CHANGELOG.md section extracted above → latest.json notes.
          releaseBody: ${{ env.RELEASE_NOTES }}
          releaseDraft: true
          prerelease: false
          # tauri-action v1.0.0 renamed includeUpdaterJson → uploadUpdaterJson.
          # Unknown `with:` inputs are silently ignored, so keeping the old name
          # would drop latest.json from the release and break auto-update.
          uploadUpdaterJson: true
          args: --config src-tauri/updater-build.json
